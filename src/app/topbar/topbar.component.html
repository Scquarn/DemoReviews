<mat-toolbar>
  <button
    mat-icon-button
    class="menu-icon"
    (click)="this.menuButtonClicked.emit()"
  >
    <mat-icon>menu</mat-icon>
  </button>
  <span>Einglas Reviews</span>
  <span class="topbar-spacer"></span>
  <mat-slider
    class="hide-slider"
    max="40"
    min="5"
    step="5"
    [discrete]="false"
    [showTickMarks]="true"
  >
    <input
      matSliderThumb
      [(ngModel)]="value"
      #slider
      (click)="this.changePadding(value)"
    />
  </mat-slider>
</mat-toolbar>
